<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Painel</title>

    <link rel="stylesheet" href="css/inicio.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <button class="menu-mobile">

    <i class="fa-solid fa-bars"></i>

</button>


    <div class="layout">

    <aside class="sidebar">

    <div class="logo">

        <h2>Grupo de Conexões</h2>

    </div>

        <nav>

            <a href="pagina-inicial.html" class="ativo">
                🏠 Início
            </a>

            <a href="novo-relatorio.html">
                📝 Novo Relatório
            </a>

            <a href="relatorios.html">
                📋 Relatórios
            </a>

            <a href="usuarios.html" id="menuUsuarios">
                👥 Usuários
            </a>

        </nav>

        <div class="sair">

            <a href="index.html">
                🚪 Sair
            </a>

        </div>

        <div class="perfil">

            <div class="foto">
                SN
            </div>

            <div>

                <strong id="nomeUsuario">
                    Saimon
                </strong>

                <p>Administrador</p>

                <span class="online">
                    Online
                </span>

            </div>

        </div>

    </aside>

   <main class="content">

    <div class="topo">

        <div class="titulo">

            <h1>Bem-vindo 👋</h1>

            <p>Informações do Grupo de Conexões</p>

        </div>

    <div class="acoes-topo">

        <button id="tema-btn" class="tema-btn">
        <i class="fa-solid fa-moon"></i>
        </button>

        <button class="notificacao">
        <i class="fa-regular fa-bell"></i>
        <span class="badge">3</span>
        </button>

    </div>

    </div>

    <div class="cards">

    <div class="card azul">

        <div class="icone">
            <i class="fa-regular fa-file-lines"></i>
        </div>

        <div class="info">
            <p>Total de Relatórios</p>
            <h2 id="totalRelatorios">0</h2>
        </div>

    </div>

    <div class="card">

        <div class="icone verde">
            <i class="fa-solid fa-users"></i>
        </div>

        <div class="info">
            <p>Total de Líderes</p>
            <h2 id="totalLideres">0</h2>
        </div>

    </div>

    <div class="card">

        <div class="icone roxo">
            <i class="fa-regular fa-calendar"></i>
        </div>

        <div class="info">
            <p>Relatórios este mês</p>
            <h2 id="relatoriosMes">0</h2>
        </div>

    </div>

    <div class="card">

        <div class="icone laranja">
            <i class="fa-regular fa-clock"></i>
        </div>

        <div class="info">
            <p>Pendentes</p>
            <h2 id="pendentes">0</h2>
        </div>

    </div>

</div>

    </div>

</main>

</div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="js/supabase.js"></script>

    <script src="js/PAGINA-INICIO.JS"></script>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="js/permissoes.js"></script>

    <script src="js/menu.js"></script>

    <nav class="bottom-nav">

    <a href="relatorios.html" class="nav-item">
        <i class="fa-regular fa-file-lines"></i>
        <span>Relatórios</span>
    </a>

    <a href="novo-relatorio.html" class="nav-item central">
        <i class="fa-solid fa-plus"></i>
        <span>Novo</span>
    </a>

    <a href="usuarios.html" class="nav-item" id="menuUsuarios">
        <i class="fa-solid fa-users"></i>
        <span>Usuários</span>
    </a>

</nav>
    
</body>
</html>
